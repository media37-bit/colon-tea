<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>طلب خلطة القولون</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; margin-top: 50px; }
        .form-container { max-width: 400px; margin: auto; padding: 20px; border: 1px solid #ccc; border-radius: 10px; }
        input { width: 90%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; }
        button { width: 95%; padding: 10px; background-color: #28a745; color: white; border: none; border-radius: 5px; font-size: 18px; cursor: pointer; }
        button:hover { background-color: #218838; }
    </style>

    </head>
<body>

    <div class="form-container">
        <h2>اطلب الآن والدفع عند الاستلام</h2>
        <form id="orderForm">
            <input type="text" id="customerName" placeholder="الاسم الكامل" required>
            <input type="tel" id="customerPhone" placeholder="رقم الهاتف" required>
            <button type="submit" id="submitBtn">تأكيد الطلب</button>
        </form>
    </div>

    <script>
        document.getElementById('orderForm').addEventListener('submit', function(e) {
            e.preventDefault(); 

            const name = document.getElementById('customerName').value;
            const phone = document.getElementById('customerPhone').value;
            const btn = document.getElementById('submitBtn');

            // 👇 ضع رابط Google Apps Script (Web app URL) هنا 👇
            const googleScriptUrl = 'https://script.google.com/macros/s/AKfycbxHRdwh_QKZpCKHcMYcqX7fDmUAqUczB2J1zdOsEOypMTo9J_ZvcedDJ7Sa6z4tgml0/exec';
            
            const payload = {
                name: name,
                phone: phone
            };

            btn.innerText = "جاري الإرسال...";

            // تعديل بسيط لتجاوز حماية المتصفح (CORS)
            fetch(googleScriptUrl, {
                method: 'POST',
                mode: 'no-cors', // هذه الكلمة السحرية تمنع المتصفح من حظر الطلب
                body: JSON.stringify(payload),
                headers: {
                    'Content-Type': 'text/plain;charset=utf-8',
                }
            })
            .then(() => {
                // في حالة no-cors لا ننتظر رداً مفصلاً من جوجل، نعتبر الإرسال ناجحاً
                alert('تم تسجيل طلبك بنجاح! سنتصل بك قريباً.');
                document.getElementById('orderForm').reset(); 
                btn.innerText = "تأكيد الطلب";
            })
            .catch(error => {
                console.error('تفاصيل الخطأ:', error);
                alert('حدث خطأ في الاتصال. المرجو المحاولة مجدداً.');
                btn.innerText = "تأكيد الطلب";
            });
        });
    </script>
</body>
</html>
