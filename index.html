<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>طلب خلطة القولون</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; margin-top: 50px; }
        .form-container { max-width: 400px; margin: auto; padding: 20px; border: 1px solid #ccc; border-radius: 10px; }
        input { width: 90%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; }
        button { width: 95%; padding: 10px; background-color: #28a745; color: white; border: none; border-radius: 5px; font-size: 18px; cursor: pointer; }
        button:hover { background-color: #218838; }
    </style>
</head>
<body>

    <div class="form-container">
        <h2>اطلب الآن والدفع عند الاستلام</h2>
        <form id="orderForm">
            <input type="text" id="customerName" placeholder="الاسم الكامل" required>
            <input type="tel" id="customerPhone" placeholder="رقم الهاتف" required>
            <button type="submit" id="submitBtn">تأكيد الطلب</button>
        </form>
    </div>

    <script>
        document.getElementById('orderForm').addEventListener('submit', function(e) {
            e.preventDefault(); // منع إعادة تحميل الصفحة

            // 1. جمع البيانات من الفورم
            const name = document.getElementById('customerName').value;
            const phone = document.getElementById('customerPhone').value;
            const btn = document.getElementById('submitBtn');

            // 2. إعدادات تليجرام (ضع بياناتك هنا)
            const botToken = 'ضع_هنا_التوكن_الخاص_بالبوت'; // مثال: 123456:ABC-DEF1234ghIkl-zyx57W2v1u123ew11
            const chatId = 'ضع_هنا_الـ_ID_الخاص_بك';       // مثال: 987654321

            // 3. تنسيق الرسالة التي ستصلك
            const message = `🚨 طلب جديد (منتج القولون) 🚨%0A%0A👤 الاسم: ${name}%0A📱 الهاتف: ${phone}`;

            // 4. إرسال البيانات عبر API تليجرام
            const url = `https://api.telegram.org/bot${botToken}/sendMessage?chat_id=${chatId}&text=${message}`;

            btn.innerText = "جاري الإرسال...";

            fetch(url)
                .then(response => {
                    if(response.ok) {
                        alert('تم تسجيل طلبك بنجاح! سنتصل بك قريباً.');
                        document.getElementById('orderForm').reset(); // إفراغ الخانات
                        btn.innerText = "تأكيد الطلب";
                    } else {
                        alert('حدث خطأ، يرجى المحاولة مرة أخرى.');
                        btn.innerText = "تأكيد الطلب";
                    }
                })
                .catch(error => {
                    console.error('Error:', error);
                    alert('حدث خطأ في الاتصال.');
                    btn.innerText = "تأكيد الطلب";
                });
        });
    </script>
</body>
</html>
